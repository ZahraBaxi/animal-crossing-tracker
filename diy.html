html{font-size:15px;}

/* HEADER */
header{padding:3rem 2rem 0;border-bottom:1px solid var(--border);max-width:1060px;margin:0 auto;}
.header-top{display:flex;align-items:baseline;gap:1.2rem;flex-wrap:wrap;padding-bottom:1.5rem;}
.site-title{font-family:'DM Mono',monospace;font-weight:400;font-size:1.05rem;color:var(--ink);}
.site-title span{color:var(--rust);font-size:0.9rem;}
.site-meta{font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--ink-dim);letter-spacing:0.04em;text-transform:uppercase;}
.nav-links{margin-left:auto;display:flex;gap:1rem;align-items:center;}
.back-link{font-family:'DM Mono',monospace;font-size:0.68rem;color:var(--ink-dim);text-decoration:none;letter-spacing:0.04em;border-bottom:1px solid var(--border);padding-bottom:1px;transition:color 0.15s;}
.back-link:hover{color:var(--rust);border-color:var(--rust);}
.user-chip{font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--ink-dim);}

/* PRIMARY TABS (crafting / food) */
.primary-tab-nav{display:flex;gap:0;margin-top:1.2rem;}
.primary-tab-btn{font-family:'DM Mono',monospace;font-size:0.72rem;letter-spacing:0.07em;text-transform:uppercase;
  color:var(--ink-dim);background:none;border:none;border-bottom:2px solid transparent;
  padding:0.6rem 1.4rem 0.7rem;cursor:pointer;white-space:nowrap;transition:color 0.15s,border-color 0.15s;position:relative;top:1px;}
.primary-tab-btn:hover{color:var(--ink-mid);}
.primary-tab-btn.active{color:var(--rust);border-bottom-color:var(--rust);}
.primary-tab-btn .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--wheat);margin-right:0.5rem;vertical-align:middle;position:relative;top:-1px;}
.primary-tab-btn.active .dot{background:var(--rust);}

.wrap{max-width:1060px;margin:0 auto;padding:2rem;}
.primary-panel{display:none;}.primary-panel.active{display:block;}

/* SECONDARY TABS (sub-tabs) */
.sub-tab-nav{display:flex;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);margin-bottom:1.8rem;}
.sub-tab-nav::-webkit-scrollbar{display:none;}
.stab{font-family:'DM Mono',monospace;font-size:0.68rem;letter-spacing:0.07em;text-transform:uppercase;
  color:var(--ink-dim);background:none;border:none;border-bottom:2px solid transparent;

.stab:hover{color:var(--ink-mid);}
.stab.active{color:var(--moss);border-bottom-color:var(--moss);}
.stab-count{font-size:0.58rem;color:var(--ink-dim);margin-left:0.35rem;}
.stab.active .stab-count{color:var(--moss);}
.sub-panel{display:none;}.sub-panel.active{display:block;}

/* SECTION HEADER */
.section-header{display:flex;align-items:center;gap:0.9rem;margin-bottom:1rem;flex-wrap:wrap;}
.section-title{font-family:'DM Mono',monospace;font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-mid);}
.prog-row{display:flex;align-items:center;gap:0.75rem;margin-bottom:1.5rem;}
.prog-track{flex:1;height:4px;background:var(--border-lt);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;background:var(--rust);border-radius:99px;transition:width 0.4s;}
.prog-label{font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--ink-dim);white-space:nowrap;}
.prog-label strong{color:var(--rust);font-weight:500;}

.recipe-card.obtained{background:var(--done-bg);}
.recipe-card.obtained:hover{background:#d3deca;}

.tag-dive{background:rgba(107,124,92,0.12);color:var(--moss);border:1px solid rgba(107,124,92,0.25);}

const CATCH_FISH=['anchovy','salmon','dab','squid','sea bass','red snapper','horse mackerel','crucian carp'];
const CATCH_SEA=['tiger prawn','sweet shrimp','manila clam','scallop','seaweed'];

function matTag(mat){
  const low=mat.toLowerCase();
  if(CATCH_FISH.some(f=>low.includes(f))) return '<span class="rc-mat-tag tag-catch">fish</span>';
  if(CATCH_SEA.some(s=>low.includes(s))) return '<span class="rc-mat-tag tag-dive">dive/beach</span>';
  if(low.includes('mushroom')) return '<span class="rc-mat-tag tag-catch">forage</span>';
  if(low.includes('bamboo shoot')) return '<span class="rc-mat-tag tag-catch">forage</span>';
  if(low.includes('turnip')) return '<span class="rc-mat-tag tag-catch">buy from daisy</span>';
  if(low.includes('weed')||low==='clump of weeds') return '<span class="rc-mat-tag tag-catch">pull weeds</span>';
  return '';
}

// collectNote — special items needed (non-standard)
function collectNote(mats){
  const specials=[];
  mats.forEach(([qty,mat])=>{
    const low=mat.toLowerCase();
    if(CATCH_FISH.some(f=>low.includes(f))) specials.push(mat+' (catch fish)');
    else if(CATCH_SEA.some(s=>low.includes(s))) specials.push(mat+' (dive/beach)');
    else if(low.includes('mushroom')) specials.push(mat+' (forage in Nov)');
    else if(low.includes('bamboo shoot')) specials.push(mat+' (dig bamboo grove)');
    else if(low.includes('turnip')&&!low.includes('fish')) specials.push('Turnips (buy from Daisy Mae on Sunday)');
    else if(low.includes('tomato puree')) specials.push('Tomato puree (craft from 3 tomato)');
    else if(low.includes('weed')) specials.push('Clump of Weeds (pull from ground)');
  });
  return [...new Set(specials)];
}

// ── STATE ───────────────────────────────────────────────────────────────────
let obtained={savory:[],sweet:[],housewares:[],wallmounted:[],wallpaper:[],fencing:[],tools:[],objects:[]};
let parseObj=null;
let primaryTab='food';
let foodTab='savory';
let craftTab='housewares';
let searchQ={savory:'',sweet:'',housewares:'',wallmounted:'',wallpaper:'',fencing:'',tools:'',objects:''};
let filterF={savory:'all',sweet:'all',housewares:'all',wallmounted:'all',wallpaper:'all',fencing:'all',tools:'all',objects:'all'};

const FOOD_SECTIONS={
  savory:{label:'Savory',data:SAVORY},
  sweet:{label:'Sweet',data:SWEET},
};
const CRAFT_SECTIONS={
  housewares:{label:'Housewares',data:HOUSEWARES},
  wallmounted:{label:'Wall-mounted',data:WALLMOUNTED},
  wallpaper:{label:'Wallpaper & Flooring',data:WALLPAPER_FLOORING},
  fencing:{label:'Fencing',data:FENCING},
  tools:{label:'Tools',data:TOOLS},
  objects:{label:'Objects',data:OBJECTS},
};

(async()=>{
  const u=Parse.User.current();
  if(!u){window.location.href='index.html';return;}
  document.getElementById('userChip').textContent=u.get('email')||u.get('username');
  await loadData();
  buildNav();
  renderAll();
})();

async function loadData(){
  const u=Parse.User.current();
  try{
    const q=new Parse.Query('DIYData');q.equalTo('user',u);
    parseObj=await q.first()||null;
    if(parseObj){
      const saved=parseObj.get('obtained')||{};
      Object.keys(obtained).forEach(k=>{obtained[k]=saved[k]||[];});
    }
  }catch(e){console.error(e);}
}

async function saveData(){
  const u=Parse.User.current();if(!u)return;
  try{
    if(!parseObj){
      const D=Parse.Object.extend('DIYData');parseObj=new D();
      parseObj.set('user',u);
      const acl=new Parse.ACL(u);parseObj.setACL(acl);
    }
    parseObj.set('obtained',obtained);
    await parseObj.save();
  }catch(e){console.error(e);}
}

function buildNav(){
  // Food sub tabs
  const fn=document.getElementById('foodTabNav');
  fn.innerHTML='';
  Object.entries(FOOD_SECTIONS).forEach(([k,s])=>{
    const b=document.createElement('button');b.className='stab'+(k===foodTab?' active':'');
    b.id='ftab-'+k;b.onclick=()=>setFoodTab(k);
    b.innerHTML=s.label+`<span class="stab-count">${obtained[k].length}/${s.data.length}</span>`;
    fn.appendChild(b);
    const p=document.createElement('div');p.className='sub-panel'+(k===foodTab?' active':'');
    p.id='fpanel-'+k;document.getElementById('foodPanels').appendChild(p);
  });
  // Craft sub tabs
  const cn=document.getElementById('craftTabNav');
  cn.innerHTML='';
  Object.entries(CRAFT_SECTIONS).forEach(([k,s])=>{
    const b=document.createElement('button');b.className='stab'+(k===craftTab?' active':'');
    b.id='ctab-'+k;b.onclick=()=>setCraftTab(k);
    b.innerHTML=s.label+`<span class="stab-count">${obtained[k].length}/${s.data.length}</span>`;
    cn.appendChild(b);
    const p=document.createElement('div');p.className='sub-panel'+(k===craftTab?' active':'');
    p.id='cpanel-'+k;document.getElementById('craftPanels').appendChild(p);
  });
}

function renderAll(){
  Object.keys(FOOD_SECTIONS).forEach(k=>renderSection(k,'f'));
  Object.keys(CRAFT_SECTIONS).forEach(k=>renderSection(k,'c'));
  updateNavCounts();
}

function updateNavCounts(){
  Object.keys(FOOD_SECTIONS).forEach(k=>{
    const b=document.getElementById('ftab-'+k);if(b){const s=b.querySelector('.stab-count');if(s)s.textContent=obtained[k].length+'/'+FOOD_SECTIONS[k].data.length;}
  });
  Object.keys(CRAFT_SECTIONS).forEach(k=>{
    const b=document.getElementById('ctab-'+k);if(b){const s=b.querySelector('.stab-count');if(s)s.textContent=obtained[k].length+'/'+CRAFT_SECTIONS[k].data.length;}
  });
}

function renderSection(key,pfx){
  const SECS=pfx==='f'?FOOD_SECTIONS:CRAFT_SECTIONS;
  const sec=SECS[key];
  const el=document.getElementById((pfx==='f'?'fpanel-':'cpanel-')+key);
  if(!el)return;
  const done=obtained[key].length;
  const total=sec.data.length;
  const pct=total>0?Math.round(done/total*100):0;
  const q=searchQ[key]||'';
  const f=filterF[key]||'all';

  let items=sec.data.map((item,i)=>({item,i}));
  if(q) items=items.filter(x=>x.item.n.toLowerCase().includes(q.toLowerCase()));
  if(f==='obtained') items=items.filter(x=>obtained[key].includes(x.i));
  if(f==='missing') items=items.filter(x=>!obtained[key].includes(x.i));

  let html=`<div class="prog-row">
    <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
    <div class="prog-label"><strong>${done}</strong> / ${total} &middot; ${pct}%</div>
  </div>
  <div class="controls-row">
    <div class="search-wrap"><input type="text" placeholder="search..." value="${q.replace(/"/g,'&quot;')}" oninput="setSearch('${key}','${pfx}',this.value)"/></div>
    <button class="filter-btn${f==='all'?' active':''}" onclick="setFilter('${key}','${pfx}','all')">all</button>
    <button class="filter-btn${f==='missing'?' active':''}" onclick="setFilter('${key}','${pfx}','missing')">missing</button>
    <button class="filter-btn${f==='obtained'?' active':''}" onclick="setFilter('${key}','${pfx}','obtained')">obtained</button>
  </div>`;

  if(items.length===0){
    html+='<div class="empty-msg">no results</div>';
  }else{
    html+='<div class="recipe-grid">';
    items.forEach(({item,i})=>{
      const got=obtained[key].includes(i);
      const matHtml=item.mats.map(([qty,mat])=>{
        const tag=matTag(mat);
        return `<div class="rc-mat-item">${qty}× ${mat}${tag}</div>`;
      }).join('');
      const srcHtml=(item.src||[]).join(' ');
      const noteHtml=item.srcNote?`<span style="opacity:0.7;">${item.srcNote}</span>`:'';
      const notes=collectNote(item.mats);
      const collectHtml=notes.length?`<div class="rc-collect">→ need: ${notes.join(', ')}</div>`:'';
      html+=`<div class="recipe-card${got?' obtained':''}" onclick="toggle('${key}','${pfx}',${i})">
        <div class="rc-top">
          <div class="rc-check">${SVG_CHECK}</div>
          <div class="rc-name">${item.n}</div>
        </div>
        <div class="rc-body">
          <div class="rc-mats">${matHtml}</div>
          <div class="rc-obtain">${srcHtml}${noteHtml}</div>
          ${collectHtml}
        </div>
      </div>`;
    });
    html+='</div>';
  }
  el.innerHTML=html;
}

function toggle(key,pfx,idx){
  const arr=obtained[key];
  const pos=arr.indexOf(idx);
  if(pos>=0)arr.splice(pos,1);else arr.push(idx);
  saveData();
  renderSection(key,pfx);
  updateNavCounts();
}

function setSearch(key,pfx,val){
  searchQ[key]=val;renderSection(key,pfx);
}
function setFilter(key,pfx,f){
  filterF[key]=f;renderSection(key,pfx);
}

function setPrimaryTab(t){
  primaryTab=t;
  document.getElementById('ptab-food').classList.toggle('active',t==='food');
  document.getElementById('ptab-crafting').classList.toggle('active',t==='crafting');
  document.getElementById('ppanel-food').classList.toggle('active',t==='food');
  document.getElementById('ppanel-crafting').classList.toggle('active',t==='crafting');
}

function setFoodTab(k){
  foodTab=k;
  document.querySelectorAll('#foodTabNav .stab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('#foodPanels .sub-panel').forEach(p=>p.classList.remove('active'));
  const b=document.getElementById('ftab-'+k);if(b)b.classList.add('active');
  const p=document.getElementById('fpanel-'+k);if(p)p.classList.add('active');
  renderSection(k,'f');
}

function setCraftTab(k){
  craftTab=k;
  document.querySelectorAll('#craftTabNav .stab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('#craftPanels .sub-panel').forEach(p=>p.classList.remove('active'));
  const b=document.getElementById('ctab-'+k);if(b)b.classList.add('active');
  const p=document.getElementById('cpanel-'+k);if(p)p.classList.add('active');
  renderSection(k,'c');
}
</script>
